html<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Gold & Silver Rate</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .crypto-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 100%; }
        h2 { color: #333; margin-bottom: 20px; }
        .rate-box { font-size: 20px; font-weight: bold; margin: 15px 0; padding: 12px; border-radius: 5px; color: white; }
        .gold { background: linear-gradient(135deg, #ffd700, #b8860b); }
        .silver { background: linear-gradient(135deg, #c0c0c0, #708090); }
        .loading { font-style: italic; color: #777; }
    </style>
</head>
<body>

<div class="crypto-container">
    <h2>Live Gold & Silver Rates (India)</h2>
    
    <!-- Gold Rate Display -->
    <div id="gold-rate" class="rate-box gold">
        Gold (24K/10g): <span class="loading">Loading...</span>
    </div>
    
    <!-- Silver Rate Display -->
    <div id="silver-rate" class="rate-box silver">
        Silver (1kg): <span class="loading">Loading...</span>
    </div>
</div>

<script>
    // Free Financial API nunchi live data test cheyadaaniki
    async function fetchRates() {
        try {
            // Free API URL (Indian Rupees INR loki marchi chupisthundi)
            const response = await fetch('https://exchangerate-api.com');
            const data = await response.json();
            const inrRate = data.rates.INR;

            // Note: Ivi dummy calculation/live conversion ratios integration testing kosam
            // Nijamaina accurate live local market rates kosam GoldAPI.io key vadandi
            let baseGoldPrice = 75000; 
            let baseSilverPrice = 92000;

            document.getElementById('gold-rate').innerHTML = `Gold (24K/10g): ₹${baseGoldPrice.toLocaleString('en-IN')}`;
            document.getElementById('silver-rate').innerHTML = `Silver (1kg): ₹${baseSilverPrice.toLocaleString('en-IN')}`;
        } catch (error) {
            document.getElementById('gold-rate').innerText = "Rate Load Avvaledu";
            document.getElementById('silver-rate').innerText = "Rate Load Avvaledu";
        }
    }

    // Page open avvagane rates run avthayee
    fetchRates();
</script>

</body>
</html>
Use code with caution.
