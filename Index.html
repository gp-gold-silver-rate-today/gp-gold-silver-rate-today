<!DOCT<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Gold & Silver Rates India</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .container { background: white; padding: 20px; max-width: 400px; margin: auto; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h1 { color: #d4af37; }
        .price-box { margin: 20px 0; padding: 15px; border-radius: 5px; font-size: 20px; font-weight: bold; }
        .gold { background-color: #fff8e7; border: 1px solid #d4af37; color: #b8860b; }
        .silver { background-color: #f0f0f0; border: 1px solid #c0c0c0; color: #696969; }
        .loading { font-size: 16px; color: gray; }
    </style>
</head>
<body>

<div class="container">
    <h1>లైవ్ బంగారం & వెండి ధరలు</h1>
    <p>భారతదేశంలో నేటి లైవ్ మార్కెట్ రేట్లు (INR)</p>
    
    <div id="loading" class="loading">ధరలను అప్‌డేట్ చేస్తున్నాము...</div>
    
    <div id="rates-container" style="display: none;">
        <div class="price-box gold">
            బంగారం (24K - 10 గ్రాములు): <br>
            <span id="gold-price">₹0</span>
        </div>
        <div class="price-box silver">
            వెండి (1 కేజీ): <br>
            <span id="silver-price">₹0</span>
        </div>
    </div>
</div>

<script>
    // ఉచిత పబ్లిక్ API ద్వారా ధరలను సేకరించడం
    async function fetchLiveRates() {
        try {
            // GoldPriceOrg యొక్క పబ్లిక్ API ని వాడుతున్నాము
            const response = await fetch('https://goldprice.org');
            const data = await response.json();
            
            if(data && data.items && data.items[0]) {
                const goldOunceINR = data.items[0].xauPrice; // 1 Troy Ounce Gold in INR
                const silverOunceINR = data.items[0].xagPrice; // 1 Troy Ounce Silver in INR
                
                // 1 Troy Ounce = 31.1035 Grams
                // 10 గ్రాముల 24K బంగారం ధర లెక్కించడం
                const gold10Gram = (goldOunceINR / 31.1035) * 10;
                
                // 1 కేజీ (1000 గ్రాములు) వెండి ధర లెక్కించడం
                const silver1Kg = (silverOunceINR / 31.1035) * 1000;
                
                // స్క్రీన్ పై ధరలను చూపించడం (భారతీయ కరెన్సీ ఫార్మాట్ లో)
                document.getElementById('gold-price').innerText = "₹" + Math.round(gold10Gram).toLocaleString('en-IN');
                document.getElementById('silver-price').innerText = "₹" + Math.round(silver1Kg).toLocaleString('en-IN');
                
                // లోడింగ్ టెక్స్ట్ దాచి, ధరలను చూపించడం
                document.getElementById('loading').style.display = 'none';
                document.getElementById('rates-container').style.display = 'block';
            }
        } catch (error) {
            console.error("Error fetching rates:", error);
            document.getElementById('loading').innerText = "ధరలను లోడ్ చేయడంలో లోపం జరిగింది. మళ్లీ ప్రయత్నించండి.";
        }
    }

    // పేజీ ఓపెన్ అవ్వగానే ఫంక్షన్ రన్ అవుతుంది
    fetchLiveRates();
</script>

</body>
</html>￼Enter
